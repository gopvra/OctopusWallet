version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: octopus
      POSTGRES_PASSWORD: octopus
      POSTGRES_DB: octopus_wallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octopus -d octopus_wallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "8080:8080"
    environment:
      OCTOPUS_DATABASE_URL: "postgres://octopus:octopus@postgres:5432/octopus_wallet?sslmode=disable"
      OCTOPUS_SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      OCTOPUS_DATABASE_URL: "postgres://octopus:octopus@postgres:5432/octopus_wallet?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config

volumes:
  pgdata:
